version: '3.8'

services:
  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: collabai-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/collabai
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongo
      - redis
    networks:
      - collabai-network
    restart: unless-stopped

  # MongoDB Database
  mongo:
    image: mongo:7
    container_name: collabai-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - collabai-network
    restart: unless-stopped

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: collabai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - collabai-network
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:

networks:
  collabai-network:
    driver: bridge
